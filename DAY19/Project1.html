<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Product List Manager

let products = ["Laptop", "Mobile", "Keyboard"];

// Display products
console.log("Initial Product List:");
for (let product of products) {
    console.log(product);
}

// Add product
products.push("Mouse");

console.log("\nAfter Adding Mouse:");
for (let product of products) {
    console.log(product);
}

// Remove last product
products.pop();

console.log("\nAfter Removing Last Product:");
for (let product of products) {
    console.log(product);
}
    </script>
</body>
</html>
